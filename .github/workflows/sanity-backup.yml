name: Sanity backup

# Exports the whole Sanity dataset (all documents, drafts and assets) on a
# schedule and stores it as a downloadable workflow artifact.
#
# Setup (one-time):
#   1. In sanity.io/manage → pokcas project → API → Tokens, create a token with
#      "Viewer" (read) permission. Copy it.
#   2. In GitHub → repo → Settings → Secrets and variables → Actions → New
#      repository secret, name it SANITY_AUTH_TOKEN and paste the token.
#   3. (Optional) Adjust the cron schedule below.
#
# Restore a backup: download the artifact, then run
#   npx sanity dataset import ./pokcas-production-YYYY-MM-DD.tar.gz production --missing
# (use --replace instead of --missing to overwrite existing documents).

on:
  schedule:
    - cron: '0 3 * * *' # every day at 03:00 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: read

concurrency:
  group: sanity-backup
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
      NEXT_PUBLIC_SANITY_PROJECT_ID: a23xp5s4
      NEXT_PUBLIC_SANITY_DATASET: production
    steps:
      - name: Check token is configured
        run: |
          if [ -z "$SANITY_AUTH_TOKEN" ]; then
            echo "::error::Missing SANITY_AUTH_TOKEN secret. See the setup notes at the top of this workflow."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export dataset
        run: |
          mkdir -p backups
          STAMP="$(date -u +'%Y-%m-%d')"
          npx sanity dataset export production "backups/pokcas-production-${STAMP}.tar.gz"
          ls -lh backups/

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanity-backup-${{ github.run_id }}
          path: backups/*.tar.gz
          retention-days: 90
          if-no-files-found: error
